{% extends "base.html" %}
{% block title %}Promote to Library{% endblock %}

{% block content %}
<h1>Promote to Library</h1>
<p class="subtitle">From capture &middot; {{ capture.source }} &middot; {{ capture.created_at[:10] }}</p>

<div class="form-card">
  <form method="POST" action="{{ url_for('capture_promote', idx=capture.id) }}">

    <div class="form-group">
      <label for="type">Type</label>
      <select name="type" id="type" required>
        <option value="pattern" selected>Pattern</option>
        <option value="story">Story</option>
        <option value="identity">Identity Dimension</option>
      </select>
    </div>

    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" name="name" id="name" placeholder="e.g. Chesterton's Fence"
             value="{{ prefill_name }}" required>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea name="description" id="description" rows="4">{{ prefill_description }}</textarea>
    </div>

    <div>
      <button type="submit" class="btn">Add to Library</button>
      <a href="{{ url_for('capture') }}" class="btn btn-secondary">← Cancel</a>
    </div>

  </form>
</div>
{% endblock %}
