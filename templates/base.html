<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Pattern Library{% endblock %} — content-engine</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #f4f4f0;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      padding: 18px 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header .brand {
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 0.5px;
      text-decoration: none;
    }

    header .brand span {
      color: #7aaacc;
      font-weight: normal;
    }

    nav a {
      color: #aac4dd;
      text-decoration: none;
      font-family: Arial, sans-serif;
      font-size: 14px;
      margin-left: 24px;
    }

    nav a:hover { color: #fff; }
    nav a.active { color: #fff; border-bottom: 2px solid #7aaacc; padding-bottom: 2px; }

    main {
      max-width: 860px;
      margin: 40px auto;
      padding: 0 24px;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 6px;
      color: #1a1a2e;
    }

    .subtitle {
      color: #777;
      font-family: Arial, sans-serif;
      font-size: 14px;
      margin-bottom: 36px;
    }

    .section {
      margin-bottom: 44px;
    }

    .section-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      border-bottom: 2px solid #1a1a2e;
      padding-bottom: 8px;
      margin-bottom: 18px;
    }

    .section-header h2 {
      font-size: 18px;
      color: #1a1a2e;
    }

    .section-header .count {
      font-family: Arial, sans-serif;
      font-size: 13px;
      color: #999;
    }

    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 5px;
      padding: 16px 18px;
    }

    .card .name {
      font-size: 15px;
      font-weight: bold;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .card .desc {
      font-family: Arial, sans-serif;
      font-size: 13px;
      color: #555;
      line-height: 1.5;
    }

    .card .desc.empty {
      color: #bbb;
      font-style: italic;
    }

    .empty-state {
      font-family: Arial, sans-serif;
      font-size: 14px;
      color: #aaa;
      padding: 16px 0;
    }

    /* Flash messages */
    .flash-list { list-style: none; margin-bottom: 24px; }
    .flash-list li {
      padding: 12px 16px;
      border-radius: 4px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .flash-list li.success { background: #edf7ed; border-left: 3px solid #4caf50; color: #2e7d32; }
    .flash-list li.error   { background: #fdecea; border-left: 3px solid #f44336; color: #c62828; }

    /* Form */
    .form-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 5px;
      padding: 32px 36px;
      max-width: 560px;
    }

    .form-group { margin-bottom: 22px; }

    label {
      display: block;
      font-family: Arial, sans-serif;
      font-size: 13px;
      font-weight: bold;
      color: #444;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    select, input[type="text"], textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-family: Georgia, serif;
      font-size: 15px;
      color: #1a1a2e;
      background: #fafafa;
      transition: border-color 0.15s;
    }

    select:focus, input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: #2c5f8a;
      background: #fff;
    }

    textarea { resize: vertical; min-height: 90px; }

    .btn {
      display: inline-block;
      padding: 11px 28px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
    }

    .btn:hover { background: #2c3e6e; }

    .btn-secondary {
      background: transparent;
      color: #555;
      border: 1px solid #ccc;
      margin-left: 12px;
    }

    .btn-secondary:hover { background: #f0f0f0; color: #333; }

    /* Log table */
    .log-table {
      width: 100%;
      border-collapse: collapse;
      font-family: Arial, sans-serif;
      font-size: 13px;
    }

    .log-table th {
      text-align: left;
      padding: 8px 12px;
      background: #f0f0f0;
      color: #555;
      font-weight: bold;
      border-bottom: 1px solid #ddd;
    }

    .log-table td {
      padding: 8px 12px;
      border-bottom: 1px solid #eee;
      color: #444;
      vertical-align: top;
    }

    .log-table tr:last-child td { border-bottom: none; }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tag-pattern  { background: #e8f0fe; color: #1a56c4; }
    .tag-story    { background: #fce8f3; color: #9c27b0; }
    .tag-identity { background: #e8f5e9; color: #2e7d32; }

    /* Card actions */
    .card {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card-body { flex: 1; }

    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px solid #f0f0f0;
    }

    .btn-card {
      padding: 5px 12px;
      font-family: Arial, sans-serif;
      font-size: 12px;
      border-radius: 3px;
      cursor: pointer;
      text-decoration: none;
      border: 1px solid transparent;
      display: inline-block;
    }

    .btn-edit {
      background: #f0f4ff;
      color: #2c5f8a;
      border-color: #c8d8ee;
    }

    .btn-edit:hover { background: #dce8f8; }

    .btn-delete {
      background: #fff0f0;
      color: #c62828;
      border-color: #f0c4c4;
    }

    .btn-delete:hover { background: #fde0e0; }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="{{ url_for('index') }}">content<span>-engine</span></a>
    <nav>
      <a href="{{ url_for('index') }}" class="{{ 'active' if request.endpoint == 'index' }}">Library</a>
      <a href="{{ url_for('capture') }}" class="{{ 'active' if request.endpoint in ('capture', 'capture_dismiss') }}">Capture</a>
      <a href="{{ url_for('add') }}" class="{{ 'active' if request.endpoint == 'add' }}">+ Add Entry</a>
    </nav>
  </header>

  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <ul class="flash-list">
          {% for category, message in messages %}
            <li class="{{ category }}">{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
