{% extends "base.html" %}
{% block title %}Edit Entry{% endblock %}

{% block content %}
<h1>Edit Entry</h1>
<p class="subtitle">Editing {{ entry_type }}: <strong>{{ entry.name }}</strong></p>

<div class="form-card">
  <form method="POST" action="{{ url_for('edit', entry_type=entry_type, idx=idx) }}">

    <div class="form-group">
      <label>Type</label>
      <input type="text" value="{{ entry_type }}" disabled>
    </div>

    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" name="name" id="name" value="{{ entry.name }}" required>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea name="description" id="description">{{ entry.description }}</textarea>
    </div>

    <div>
      <button type="submit" class="btn">Save Changes</button>
      <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
    </div>

  </form>
</div>
{% endblock %}
