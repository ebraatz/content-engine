{% extends "base.html" %}
{% block title %}Add Entry{% endblock %}

{% block content %}
<h1>Add Entry</h1>
<p class="subtitle">Append a new pattern, story, or identity dimension to the library.</p>

<div class="form-card">
  <form method="POST" action="{{ url_for('add') }}">

    <div class="form-group">
      <label for="type">Type</label>
      <select name="type" id="type" required>
        <option value="" disabled selected>Select a type...</option>
        <option value="pattern">Pattern</option>
        <option value="story">Story</option>
        <option value="identity">Identity Dimension</option>
      </select>
    </div>

    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" name="name" id="name" placeholder="e.g. Chesterton's Fence" required>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea name="description" id="description"
                placeholder="One sentence — what does this pattern or story represent?"></textarea>
    </div>

    <div>
      <button type="submit" class="btn">Add to Library</button>
      <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
    </div>

  </form>
</div>
{% endblock %}
